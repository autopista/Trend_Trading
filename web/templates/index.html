<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Livermore Trend - Dashboard</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lightweight-charts@4/dist/lightweight-charts.standalone.production.js"></script>
  <style>
    body { background: #0f172a; color: #e2e8f0; }
    .signal-card { transition: all 0.15s ease; }
    .signal-card:hover { transform: translateY(-1px); }
    .signal-card.active { ring: 2px; outline: 2px solid #3b82f6; }
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: #1e293b; }
    ::-webkit-scrollbar-thumb { background: #475569; border-radius: 3px; }
    /* Calendar popup */
    .cal-overlay { position: fixed; inset: 0; z-index: 40; }
    .cal-popup {
      position: absolute; top: 100%; left: 50%; transform: translateX(-50%);
      margin-top: 8px; background: #1e293b; border: 1px solid #475569;
      border-radius: 12px; padding: 16px; width: 280px;
      box-shadow: 0 20px 40px rgba(0,0,0,0.5); z-index: 50;
    }
    .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 2px; text-align: center; }
    .cal-grid .day-label { font-size: 11px; color: #64748b; padding: 4px 0; }
    .cal-grid .day {
      font-size: 13px; padding: 6px 0; border-radius: 6px;
      color: #475569; cursor: default; position: relative;
    }
    .cal-grid .day.has-signal { color: #e2e8f0; cursor: pointer; }
    .cal-grid .day.has-signal:hover { background: #334155; }
    .cal-grid .day.has-signal::after {
      content: ''; position: absolute; bottom: 2px; left: 50%;
      transform: translateX(-50%); width: 4px; height: 4px;
      background: #3b82f6; border-radius: 50%;
    }
    .cal-grid .day.selected { background: #3b82f6; color: white; font-weight: 600; }
    .cal-grid .day.selected::after { background: white; }
    .cal-grid .day.today { outline: 2px solid #f59e0b; outline-offset: -2px; }
    .date-nav-btn {
      background: #334155; border: none; color: #94a3b8;
      width: 28px; height: 28px; border-radius: 6px;
      cursor: pointer; font-size: 14px;
      display: flex; align-items: center; justify-content: center;
    }
    .date-nav-btn:hover { background: #475569; color: #e2e8f0; }
    .date-nav-btn:disabled { opacity: 0.3; cursor: default; }
    .date-nav-btn:disabled:hover { background: #334155; color: #94a3b8; }
    .date-display-btn {
      background: #334155; border: none; color: #e2e8f0;
      padding: 4px 12px; border-radius: 6px;
      font-size: 13px; font-weight: 500; cursor: pointer;
    }
    .date-display-btn:hover { background: #475569; }
  </style>
</head>
<body class="bg-slate-900 text-slate-200 min-h-screen">

  <!-- Navigation -->
  <nav class="bg-slate-800 border-b border-slate-700 px-6 py-3">
    <div class="flex items-center justify-between">
      <div class="flex items-center gap-6">
        <span class="text-amber-500 font-bold text-xl tracking-tight">Livermore Trend</span>

        <!-- Market toggle -->
        <div class="flex bg-slate-700 rounded-lg p-0.5">
          <button onclick="switchMarket('kr')"
                  id="btn-kr"
                  class="market-btn px-4 py-1.5 rounded-md text-sm font-medium transition-colors">
            &#x1F1F0;&#x1F1F7; 국장
          </button>
          <button onclick="switchMarket('us')"
                  id="btn-us"
                  class="market-btn px-4 py-1.5 rounded-md text-sm font-medium transition-colors">
            &#x1F1FA;&#x1F1F8; 미장
          </button>
        </div>

        <!-- Sub menu -->
        <div class="flex gap-4 ml-4">
          <a href="#" id="nav-dashboard"
             class="text-sm font-medium pb-1 border-b-2 border-blue-500 text-blue-400">대시보드</a>
          <a id="nav-performance"
             class="text-sm font-medium pb-1 border-b-2 border-transparent text-slate-400 hover:text-slate-200 cursor-pointer">투자성과</a>
          <span id="market-direction-badge"
                class="ml-2 px-2 py-0.5 text-xs font-semibold rounded-full bg-slate-700 text-slate-300"
                title="전체 시장 방향 (지수 기준)">시장방향: -</span>
        </div>
      </div>

      <div class="text-xs text-slate-400" id="last-update">마지막 업데이트: -</div>
    </div>
  </nav>

  <main class="p-6 max-w-[1600px] mx-auto">

    <!-- Market Index Cards -->
    <section id="indices-section" class="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-5 gap-4 mb-6">
      <!-- filled by JS -->
    </section>

    <!-- Signal Summary Cards (clickable filter) -->
    <section id="summary-section" class="grid grid-cols-3 gap-4 mb-6">
      <div class="bg-slate-800 rounded-lg p-4 border-l-4 border-green-500 cursor-pointer hover:bg-slate-700 transition-colors"
           onclick="filterSignals('buy')" id="card-buy">
        <div class="text-sm text-slate-400">매수 시그널</div>
        <div class="text-3xl font-bold text-green-400" id="count-buy">0</div>
      </div>
      <div class="bg-slate-800 rounded-lg p-4 border-l-4 border-red-500 cursor-pointer hover:bg-slate-700 transition-colors"
           onclick="filterSignals('sell')" id="card-sell">
        <div class="text-sm text-slate-400">매도 시그널</div>
        <div class="text-3xl font-bold text-red-400" id="count-sell">0</div>
      </div>
      <div class="bg-slate-800 rounded-lg p-4 border-l-4 border-yellow-500 cursor-pointer hover:bg-slate-700 transition-colors"
           onclick="filterSignals('watch')" id="card-watch">
        <div class="text-sm text-slate-400">관찰 중</div>
        <div class="text-3xl font-bold text-yellow-400" id="count-watch">0</div>
      </div>
    </section>

    <!-- Main Area: Signal List + Chart -->
    <section class="flex gap-4" style="min-height: 560px;">

      <!-- Left: Signal List -->
      <div class="w-[340px] flex-shrink-0 bg-slate-800 rounded-lg overflow-hidden flex flex-col">
        <div class="px-4 py-3 border-b border-slate-700">
          <div class="flex items-center justify-between mb-1">
            <span class="text-sm font-semibold text-slate-300" id="signal-list-title">시그널 목록</span>
            <button onclick="filterSignals('all')" class="text-xs text-slate-500 hover:text-slate-300" id="btn-show-all" style="display:none;">전체보기</button>
          </div>
          <div class="flex items-center justify-center gap-2 relative" id="date-nav">
            <button class="date-nav-btn" id="btn-prev-date" onclick="navigateDate(-1)">&#9664;</button>
            <button class="date-display-btn" id="date-display" onclick="toggleCalendar()">--.--(--)</button>
            <button class="date-nav-btn" id="btn-next-date" onclick="navigateDate(1)">&#9654;</button>
          </div>
        </div>
        <div id="signal-list" class="overflow-y-auto p-2 space-y-2" style="max-height: 500px;">
          <div class="text-center text-slate-500 text-sm py-8">데이터를 불러오는 중...</div>
        </div>
      </div>

      <!-- Right: Chart Area -->
      <div class="flex-1 bg-slate-800 rounded-lg overflow-hidden flex flex-col">
        <!-- Chart Header -->
        <div class="px-4 py-3 border-b border-slate-700 flex items-center justify-between">
          <div class="flex items-center gap-3">
            <span class="font-semibold text-lg" id="chart-symbol">종목을 선택하세요</span>
            <span class="text-sm text-slate-400" id="chart-info"></span>
          </div>
          <div class="flex bg-slate-700 rounded-lg p-0.5">
            <button onclick="changePeriod(30)"  class="period-btn px-3 py-1 rounded-md text-xs font-medium">1M</button>
            <button onclick="changePeriod(90)"  class="period-btn px-3 py-1 rounded-md text-xs font-medium bg-blue-500 text-white active-period">3M</button>
            <button onclick="changePeriod(180)" class="period-btn px-3 py-1 rounded-md text-xs font-medium">6M</button>
            <button onclick="changePeriod(365)" class="period-btn px-3 py-1 rounded-md text-xs font-medium">1Y</button>
          </div>
        </div>

        <!-- Candlestick + Volume Chart -->
        <div id="chart-container" class="relative" style="height: 320px;">
          <div id="chart-placeholder" class="absolute inset-0 flex items-center justify-center text-slate-500">
            좌측 시그널을 클릭하면 차트가 표시됩니다
          </div>
        </div>
        <!-- MACD Chart -->
        <div class="px-4 border-t border-slate-700">
          <div class="text-xs text-slate-500 py-1">MACD (12, 26, 9)</div>
        </div>
        <div id="macd-container" style="height: 100px;"></div>
        <!-- RSI Chart -->
        <div class="px-4 border-t border-slate-700">
          <div class="text-xs text-slate-500 py-1">RSI (14)</div>
        </div>
        <div id="rsi-container" style="height: 100px;"></div>

        <!-- Livermore State Bar -->
        <div class="px-4 py-3 border-t border-slate-700">
          <div class="text-xs text-slate-400 mb-2">Livermore 추세 상태</div>
          <div id="livermore-bar" class="grid grid-cols-6 gap-1">
            <div class="state-block rounded px-2 py-1.5 text-center text-xs bg-slate-700 text-slate-400" data-state="upward_trend">상승 추세</div>
            <div class="state-block rounded px-2 py-1.5 text-center text-xs bg-slate-700 text-slate-400" data-state="natural_rally">자연 반등</div>
            <div class="state-block rounded px-2 py-1.5 text-center text-xs bg-slate-700 text-slate-400" data-state="secondary_rally">2차 반등</div>
            <div class="state-block rounded px-2 py-1.5 text-center text-xs bg-slate-700 text-slate-400" data-state="secondary_reaction">2차 반락</div>
            <div class="state-block rounded px-2 py-1.5 text-center text-xs bg-slate-700 text-slate-400" data-state="natural_reaction">자연 반락</div>
            <div class="state-block rounded px-2 py-1.5 text-center text-xs bg-slate-700 text-slate-400" data-state="downward_trend">하락 추세</div>
          </div>
        </div>
      </div>
    </section>

    <!-- AI Analysis Section -->
    <section class="mt-4">
      <div class="bg-slate-800 rounded-lg overflow-hidden">
        <div class="px-4 py-3 border-b border-slate-700 flex items-center justify-between">
          <div class="flex items-center gap-3">
            <span class="text-sm font-semibold text-slate-300">AI 종목 분석</span>
            <span class="text-xs text-slate-500" id="analysis-symbol-label">종목을 선택 후 분석 버튼을 누르세요</span>
          </div>
          <button onclick="runAnalysis()"
                  id="btn-analyze"
                  disabled
                  class="px-4 py-1.5 rounded-lg text-sm font-medium bg-violet-600 hover:bg-violet-500 disabled:bg-slate-700 disabled:text-slate-500 disabled:cursor-not-allowed text-white transition-colors flex items-center gap-2">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9.663 17h4.673M12 3v1m6.364 1.636l-.707.707M21 12h-1M4 12H3m3.343-5.657l-.707-.707m2.828 9.9a5 5 0 117.072 0l-.548.547A3.374 3.374 0 0014 18.469V19a2 2 0 11-4 0v-.531c0-.895-.356-1.754-.988-2.386l-.548-.547z"/></svg>
            Gemini 분석
          </button>
        </div>
        <div id="analysis-result" class="p-4" style="display: none;">
          <!-- Analysis content rendered here -->
        </div>
        <div id="analysis-loading" class="p-8 text-center" style="display: none;">
          <div class="inline-block animate-spin rounded-full h-8 w-8 border-2 border-violet-500 border-t-transparent mb-3"></div>
          <div class="text-sm text-slate-400">Gemini가 분석 중입니다...</div>
        </div>
      </div>
    </section>
  </main>

  <script>
    // -----------------------------------------------------------------------
    // State
    // -----------------------------------------------------------------------
    let market = '{{ market }}';
    let currentSymbol = null;
    let currentDays = 90;
    let chart = null;
    let candleSeries = null;
    let volumeSeries = null;
    let macdChart = null;
    let rsiChart = null;
    let symbolNames = {};  // {ticker: display_name} mapping
    let signalDates = [];       // available signal dates (descending)
    let selectedDate = null;    // currently selected date string (YYYY-MM-DD)
    let calendarOpen = false;

    // -----------------------------------------------------------------------
    // Navigation
    // -----------------------------------------------------------------------
    document.getElementById('nav-performance').addEventListener('click', () => {
      window.location.href = `/${market}/performance`;
    });

    function switchMarket(m) {
      window.location.href = `/${m}/dashboard`;
    }

    function updateMarketButtons() {
      document.querySelectorAll('.market-btn').forEach(btn => {
        btn.classList.remove('bg-blue-500', 'text-white');
        btn.classList.add('text-slate-300');
      });
      const active = document.getElementById(`btn-${market}`);
      if (active) {
        active.classList.add('bg-blue-500', 'text-white');
        active.classList.remove('text-slate-300');
      }
    }

    // -----------------------------------------------------------------------
    // API helpers
    // -----------------------------------------------------------------------
    async function fetchJSON(url) {
      const res = await fetch(url);
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      return res.json();
    }

    // -----------------------------------------------------------------------
    // Signal Date Navigation
    // -----------------------------------------------------------------------
    const DAY_NAMES = ['일', '월', '화', '수', '목', '금', '토'];

    function formatDateShort(dateStr) {
      const d = new Date(dateStr + 'T00:00:00');
      const mm = String(d.getMonth() + 1).padStart(2, '0');
      const dd = String(d.getDate()).padStart(2, '0');
      const day = DAY_NAMES[d.getDay()];
      return `${mm}.${dd}(${day})`;
    }

    async function loadSignalDates() {
      try {
        const data = await fetchJSON(`/api/${market}/signals/dates`);
        signalDates = data.dates || [];
      } catch (e) {
        console.error('Failed to load signal dates:', e);
        signalDates = [];
      }
    }

    function initSelectedDate() {
      const stored = localStorage.getItem(`signal_date_${market}`);
      if (stored && signalDates.includes(stored)) {
        selectedDate = stored;
      } else if (signalDates.length > 0) {
        selectedDate = signalDates[0];
      } else {
        selectedDate = null;
      }
      updateDateDisplay();
    }

    function updateDateDisplay() {
      const el = document.getElementById('date-display');
      if (selectedDate) {
        el.textContent = formatDateShort(selectedDate);
      } else {
        el.textContent = '--.--(--)';
      }
      const idx = signalDates.indexOf(selectedDate);
      document.getElementById('btn-prev-date').disabled = (idx < 0 || idx >= signalDates.length - 1);
      document.getElementById('btn-next-date').disabled = (idx <= 0);
    }

    function navigateDate(direction) {
      if (!selectedDate || !signalDates.length) return;
      const idx = signalDates.indexOf(selectedDate);
      if (idx < 0) return;
      const newIdx = idx - direction;
      if (newIdx >= 0 && newIdx < signalDates.length) {
        selectDate(signalDates[newIdx]);
      }
    }

    function selectDate(dateStr) {
      selectedDate = dateStr;
      localStorage.setItem(`signal_date_${market}`, dateStr);
      updateDateDisplay();
      closeCalendar();
      loadSignals();
      loadSummary();
    }

    function toggleCalendar() {
      if (calendarOpen) { closeCalendar(); } else { openCalendar(); }
    }

    function closeCalendar() {
      calendarOpen = false;
      const existing = document.getElementById('cal-popup');
      if (existing) existing.remove();
      const overlay = document.getElementById('cal-overlay');
      if (overlay) overlay.remove();
    }

    function openCalendar() {
      closeCalendar();
      calendarOpen = true;

      const overlay = document.createElement('div');
      overlay.id = 'cal-overlay';
      overlay.className = 'cal-overlay';
      overlay.onclick = closeCalendar;
      document.body.appendChild(overlay);

      const popup = document.createElement('div');
      popup.id = 'cal-popup';
      popup.className = 'cal-popup';

      const refDate = selectedDate ? new Date(selectedDate + 'T00:00:00') : new Date();
      renderCalendarMonth(popup, refDate.getFullYear(), refDate.getMonth());

      document.getElementById('date-nav').appendChild(popup);
    }

    function renderCalendarMonth(popup, year, month) {
      const today = new Date();
      const todayStr = today.toISOString().slice(0, 10);

      const header = document.createElement('div');
      header.style.cssText = 'display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;';

      const prevBtn = document.createElement('button');
      prevBtn.textContent = '◀';
      prevBtn.style.cssText = 'background:none;border:none;color:#94a3b8;cursor:pointer;font-size:14px;padding:4px;';
      prevBtn.onclick = (e) => { e.stopPropagation(); const m = month === 0 ? 11 : month - 1; const y = month === 0 ? year - 1 : year; popup.innerHTML = ''; renderCalendarMonth(popup, y, m); };

      const title = document.createElement('span');
      title.style.cssText = 'font-size:14px;font-weight:600;';
      title.textContent = `${year}년 ${month + 1}월`;

      const nextBtn = document.createElement('button');
      nextBtn.textContent = '▶';
      nextBtn.style.cssText = 'background:none;border:none;color:#94a3b8;cursor:pointer;font-size:14px;padding:4px;';
      nextBtn.onclick = (e) => { e.stopPropagation(); const m = month === 11 ? 0 : month + 1; const y = month === 11 ? year + 1 : year; popup.innerHTML = ''; renderCalendarMonth(popup, y, m); };

      header.append(prevBtn, title, nextBtn);
      popup.appendChild(header);

      const grid = document.createElement('div');
      grid.className = 'cal-grid';

      ['월','화','수','목','금','토','일'].forEach(d => {
        const label = document.createElement('div');
        label.className = 'day-label';
        label.textContent = d;
        grid.appendChild(label);
      });

      const firstDay = new Date(year, month, 1).getDay();
      const startOffset = firstDay === 0 ? 6 : firstDay - 1;
      const daysInMonth = new Date(year, month + 1, 0).getDate();

      for (let i = 0; i < startOffset; i++) {
        const empty = document.createElement('div');
        empty.className = 'day';
        grid.appendChild(empty);
      }

      for (let d = 1; d <= daysInMonth; d++) {
        const cell = document.createElement('div');
        cell.className = 'day';
        cell.textContent = d;

        const dateStr = `${year}-${String(month + 1).padStart(2, '0')}-${String(d).padStart(2, '0')}`;

        if (signalDates.includes(dateStr)) {
          cell.classList.add('has-signal');
          cell.onclick = (e) => { e.stopPropagation(); selectDate(dateStr); };
        }
        if (dateStr === selectedDate) cell.classList.add('selected');
        if (dateStr === todayStr) cell.classList.add('today');

        grid.appendChild(cell);
      }

      popup.appendChild(grid);
    }

    // -----------------------------------------------------------------------
    // Market Indices
    // -----------------------------------------------------------------------
    async function loadIndices() {
      try {
        const data = await fetchJSON(`/api/${market}/indices`);
        const container = document.getElementById('indices-section');
        if (!data.length) {
          container.innerHTML = '<div class="col-span-4 text-center text-slate-500 text-sm py-4">지수 데이터 없음</div>';
          return;
        }
        container.innerHTML = data.map(idx => {
          const positive = (idx.change_pct || 0) >= 0;
          const borderColor = positive ? 'border-green-500' : 'border-red-500';
          const changeColor = positive ? 'text-green-400' : 'text-red-400';
          const arrow = positive ? '+' : '';
          return `
            <div class="bg-slate-800 rounded-lg p-4 border-l-4 ${borderColor}">
              <div class="text-sm text-slate-400">${idx.index_name}</div>
              <div class="text-2xl font-bold">${Number(idx.value).toLocaleString()}</div>
              <div class="flex items-center justify-between mt-1">
                <span class="${changeColor} text-sm font-medium">${arrow}${(idx.change_pct || 0).toFixed(2)}%</span>
                <span class="text-xs px-2 py-0.5 rounded bg-slate-700 text-slate-300">${idx.trend_state || '-'}</span>
              </div>
            </div>`;
        }).join('');

        // Update timestamp from latest date
        const latestDate = data[0]?.date || '-';
        document.getElementById('last-update').textContent = `마지막 업데이트: ${latestDate}`;
      } catch (e) {
        console.error('Failed to load indices:', e);
      }
    }

    // -----------------------------------------------------------------------
    // Signal Summary
    // -----------------------------------------------------------------------
    async function loadSummary() {
      try {
        const dateParam = selectedDate ? `?date=${selectedDate}` : '';
        const data = await fetchJSON(`/api/${market}/signals/summary${dateParam}`);
        document.getElementById('count-buy').textContent = data.buy || 0;
        document.getElementById('count-sell').textContent = data.sell || 0;
        document.getElementById('count-watch').textContent = data.watch || 0;

        const badge = document.getElementById('market-direction-badge');
        if (badge) {
          const dir = data.market_direction || 'neutral';
          const label = { up: '상승', down: '하락', neutral: '중립' }[dir] || dir;
          badge.textContent = `시장방향: ${label}`;
          badge.classList.remove(
            'bg-slate-700', 'text-slate-300',
            'bg-emerald-600', 'text-white',
            'bg-rose-600',
            'bg-amber-600'
          );
          if (dir === 'up') {
            badge.classList.add('bg-emerald-600', 'text-white');
          } else if (dir === 'down') {
            badge.classList.add('bg-rose-600', 'text-white');
          } else {
            badge.classList.add('bg-amber-600', 'text-white');
          }
        }
      } catch (e) {
        console.error('Failed to load summary:', e);
      }
    }

    // -----------------------------------------------------------------------
    // Signal List
    // -----------------------------------------------------------------------
    let allSignals = [];
    let currentFilter = 'all';

    async function loadSignals() {
      try {
        const dateParam = selectedDate ? `?date=${selectedDate}` : '';
        allSignals = await fetchJSON(`/api/${market}/signals${dateParam}`);
        renderSignalList(allSignals);
      } catch (e) {
        console.error('Failed to load signals:', e);
      }
    }

    function filterSignals(type) {
      currentFilter = type;
      const titleEl = document.getElementById('signal-list-title');
      const showAllBtn = document.getElementById('btn-show-all');

      // Highlight active card
      ['buy', 'sell', 'watch'].forEach(t => {
        const card = document.getElementById(`card-${t}`);
        if (card) {
          card.classList.toggle('ring-2', t === type);
          card.classList.toggle('ring-blue-500', t === type);
        }
      });

      if (type === 'all') {
        titleEl.textContent = '시그널 목록';
        showAllBtn.style.display = 'none';
        renderSignalList(allSignals);
      } else {
        const typeNames = { buy: '매수', sell: '매도', watch: '관찰' };
        const filtered = allSignals.filter(s => s.signal_type === type);
        titleEl.textContent = `${typeNames[type]} 시그널 (${filtered.length})`;
        showAllBtn.style.display = 'block';
        renderSignalList(filtered);
      }
    }

    function renderSignalList(signals) {
      const container = document.getElementById('signal-list');

      if (!signals.length) {
        container.innerHTML = '<div class="text-center text-slate-500 text-sm py-8">시그널 없음</div>';
        return;
      }

      container.innerHTML = signals.map(sig => {
        const typeBadge = {
          buy:   '<span class="px-2 py-0.5 rounded text-xs font-medium bg-green-500/20 text-green-400">매수</span>',
          sell:  '<span class="px-2 py-0.5 rounded text-xs font-medium bg-red-500/20 text-red-400">매도</span>',
          watch: '<span class="px-2 py-0.5 rounded text-xs font-medium bg-yellow-500/20 text-yellow-400">관찰</span>',
        }[sig.signal_type] || '<span class="px-2 py-0.5 rounded text-xs font-medium bg-slate-600 text-slate-300">' + sig.signal_type + '</span>';

        const conf = sig.confidence != null ? `<span class="text-xs text-slate-400">${Math.round(sig.confidence)}%</span>` : '';

        return `
          <div class="signal-card bg-slate-700/50 hover:bg-slate-700 rounded-lg p-3 cursor-pointer"
               data-symbol="${sig.symbol}" onclick="selectSignal(this, '${sig.symbol}')">
            <div class="flex items-center justify-between mb-1">
              <span class="font-semibold text-sm">${displayName(sig.symbol)}</span>
              ${typeBadge}
            </div>
            <div class="text-xs text-slate-400 truncate mb-1">${sig.reason || ''}</div>
            <div class="flex items-center justify-between">
              <span class="text-sm">${sig.price ? Number(sig.price).toLocaleString() : '-'}</span>
              ${conf}
            </div>
          </div>`;
      }).join('');
    }

    // -----------------------------------------------------------------------
    // Signal selection & Chart
    // -----------------------------------------------------------------------
    function selectSignal(el, symbol) {
      document.querySelectorAll('.signal-card').forEach(c => c.classList.remove('active'));
      el.classList.add('active');
      currentSymbol = symbol;
      loadChart(symbol, currentDays);

      // Enable analyze button
      const btn = document.getElementById('btn-analyze');
      btn.disabled = false;
      document.getElementById('analysis-symbol-label').textContent = displayName(symbol);
      // Hide previous analysis
      document.getElementById('analysis-result').style.display = 'none';
    }

    function changePeriod(days) {
      currentDays = days;
      document.querySelectorAll('.period-btn').forEach(btn => {
        btn.classList.remove('bg-blue-500', 'text-white', 'active-period');
      });
      event.target.classList.add('bg-blue-500', 'text-white', 'active-period');
      if (currentSymbol) loadChart(currentSymbol, days);
    }

    async function loadChart(symbol, days) {
      document.getElementById('chart-symbol').textContent = displayName(symbol);
      document.getElementById('chart-placeholder').style.display = 'none';

      try {
        const data = await fetchJSON(`/api/${market}/chart/${symbol}?days=${days}`);
        renderChart(data);
        updateLivermoreBar(data.livermore_states);
      } catch (e) {
        console.error('Failed to load chart:', e);
      }
    }

    // --- Technical Indicator Calculations ---
    function calcEMA(data, period) {
      const k = 2 / (period + 1);
      const ema = [data[0]];
      for (let i = 1; i < data.length; i++) {
        ema.push(data[i] * k + ema[i - 1] * (1 - k));
      }
      return ema;
    }

    function calcMACD(closes) {
      if (closes.length < 26) return { macd: [], signal: [], histogram: [] };
      const ema12 = calcEMA(closes, 12);
      const ema26 = calcEMA(closes, 26);
      const macdLine = ema12.map((v, i) => v - ema26[i]);
      const signalLine = calcEMA(macdLine, 9);
      const histogram = macdLine.map((v, i) => v - signalLine[i]);
      return { macd: macdLine, signal: signalLine, histogram };
    }

    function calcRSI(closes, period = 14) {
      const rsi = new Array(closes.length).fill(50);
      if (closes.length < period + 1) return rsi;
      let gainSum = 0, lossSum = 0;
      for (let i = 1; i <= period; i++) {
        const diff = closes[i] - closes[i - 1];
        if (diff > 0) gainSum += diff; else lossSum -= diff;
      }
      let avgGain = gainSum / period;
      let avgLoss = lossSum / period;
      rsi[period] = avgLoss === 0 ? 100 : 100 - 100 / (1 + avgGain / avgLoss);
      for (let i = period + 1; i < closes.length; i++) {
        const diff = closes[i] - closes[i - 1];
        avgGain = (avgGain * (period - 1) + (diff > 0 ? diff : 0)) / period;
        avgLoss = (avgLoss * (period - 1) + (diff < 0 ? -diff : 0)) / period;
        rsi[i] = avgLoss === 0 ? 100 : 100 - 100 / (1 + avgGain / avgLoss);
      }
      return rsi;
    }

    // --- Chart options factory ---
    function makeSubChartOptions(container) {
      return {
        width: container.clientWidth,
        height: container.clientHeight,
        layout: { background: { type: 'solid', color: '#1e293b' }, textColor: '#64748b', fontSize: 10 },
        grid: { vertLines: { color: '#1e293b' }, horzLines: { color: '#334155' } },
        crosshair: { mode: LightweightCharts.CrosshairMode.Normal },
        rightPriceScale: { borderColor: '#475569', scaleMargins: { top: 0.1, bottom: 0.1 } },
        timeScale: { visible: false },
      };
    }

    function renderChart(data) {
      const container = document.getElementById('chart-container');
      const macdContainer = document.getElementById('macd-container');
      const rsiContainer = document.getElementById('rsi-container');

      // Destroy existing charts
      if (chart) { chart.remove(); chart = null; }
      if (macdChart) { macdChart.remove(); macdChart = null; }
      if (rsiChart) { rsiChart.remove(); rsiChart = null; }

      const ohlcv = data.ohlcv || [];
      if (!ohlcv.length) return;

      // === Main Chart (Candle + Volume) ===
      chart = LightweightCharts.createChart(container, {
        width: container.clientWidth,
        height: container.clientHeight,
        layout: {
          background: { type: 'solid', color: '#1e293b' },
          textColor: '#94a3b8',
        },
        grid: {
          vertLines: { color: '#334155' },
          horzLines: { color: '#334155' },
        },
        crosshair: { mode: LightweightCharts.CrosshairMode.Normal },
        rightPriceScale: { borderColor: '#475569' },
        timeScale: { borderColor: '#475569', timeVisible: false },
      });

      candleSeries = chart.addCandlestickSeries({
        upColor: '#22c55e', downColor: '#ef4444',
        borderDownColor: '#ef4444', borderUpColor: '#22c55e',
        wickDownColor: '#ef4444', wickUpColor: '#22c55e',
      });
      const candles = ohlcv.map(d => ({ time: d.date, open: d.open, high: d.high, low: d.low, close: d.close }));
      candleSeries.setData(candles);

      volumeSeries = chart.addHistogramSeries({ priceFormat: { type: 'volume' }, priceScaleId: '' });
      volumeSeries.priceScale().applyOptions({ scaleMargins: { top: 0.8, bottom: 0 } });
      volumeSeries.setData(ohlcv.map(d => ({
        time: d.date, value: d.volume,
        color: d.close >= d.open ? 'rgba(34,197,94,0.3)' : 'rgba(239,68,68,0.3)',
      })));

      chart.timeScale().fitContent();

      // === MACD Chart ===
      const closes = ohlcv.map(d => d.close);
      const times = ohlcv.map(d => d.date);
      const { macd, signal, histogram } = calcMACD(closes);

      macdChart = LightweightCharts.createChart(macdContainer, makeSubChartOptions(macdContainer));

      const macdLineSeries = macdChart.addLineSeries({ color: '#3b82f6', lineWidth: 1.5, priceScaleId: 'macd' });
      const signalLineSeries = macdChart.addLineSeries({ color: '#f59e0b', lineWidth: 1.5, priceScaleId: 'macd' });
      const histogramSeries = macdChart.addHistogramSeries({ priceScaleId: 'macd' });

      macdLineSeries.setData(macd.map((v, i) => ({ time: times[i], value: v })));
      signalLineSeries.setData(signal.map((v, i) => ({ time: times[i], value: v })));
      histogramSeries.setData(histogram.map((v, i) => ({
        time: times[i], value: v,
        color: v >= 0 ? 'rgba(34,197,94,0.6)' : 'rgba(239,68,68,0.6)',
      })));
      macdChart.timeScale().fitContent();

      // === RSI Chart ===
      const rsiValues = calcRSI(closes, 14);

      rsiChart = LightweightCharts.createChart(rsiContainer, makeSubChartOptions(rsiContainer));

      const rsiLineSeries = rsiChart.addLineSeries({ color: '#a78bfa', lineWidth: 1.5, priceScaleId: 'rsi' });
      rsiLineSeries.setData(rsiValues.map((v, i) => ({ time: times[i], value: v })));

      // RSI 70/30 기준선
      const rsi70 = rsiChart.addLineSeries({ color: '#ef4444', lineWidth: 1, lineStyle: 2, priceScaleId: 'rsi' });
      const rsi30 = rsiChart.addLineSeries({ color: '#22c55e', lineWidth: 1, lineStyle: 2, priceScaleId: 'rsi' });
      rsi70.setData(times.map(t => ({ time: t, value: 70 })));
      rsi30.setData(times.map(t => ({ time: t, value: 30 })));

      rsiChart.priceScale('rsi').applyOptions({ scaleMargins: { top: 0.05, bottom: 0.05 } });
      rsiChart.timeScale().fitContent();

      // === Sync timescales ===
      chart.timeScale().subscribeVisibleLogicalRangeChange(range => {
        if (range) {
          macdChart.timeScale().setVisibleLogicalRange(range);
          rsiChart.timeScale().setVisibleLogicalRange(range);
        }
      });
      macdChart.timeScale().subscribeVisibleLogicalRangeChange(range => {
        if (range) {
          chart.timeScale().setVisibleLogicalRange(range);
          rsiChart.timeScale().setVisibleLogicalRange(range);
        }
      });

      // Resize observer
      const ro = new ResizeObserver(() => {
        if (chart) chart.applyOptions({ width: container.clientWidth, height: container.clientHeight });
        if (macdChart) macdChart.applyOptions({ width: macdContainer.clientWidth, height: macdContainer.clientHeight });
        if (rsiChart) rsiChart.applyOptions({ width: rsiContainer.clientWidth, height: rsiContainer.clientHeight });
      });
      ro.observe(container);
    }

    function updateLivermoreBar(states) {
      // Reset all
      document.querySelectorAll('.state-block').forEach(el => {
        el.classList.remove('bg-green-500', 'bg-red-500', 'bg-blue-500', 'text-white');
        el.classList.add('bg-slate-700', 'text-slate-400');
      });

      if (!states || !states.length) return;

      const latest = states[states.length - 1];
      const currentState = latest.column_state;
      const direction = latest.trend_direction;

      document.querySelectorAll('.state-block').forEach(el => {
        if (el.dataset.state === currentState) {
          el.classList.remove('bg-slate-700', 'text-slate-400');
          if (direction === 'up' || currentState.includes('upward') || currentState.includes('rally')) {
            el.classList.add('bg-green-500', 'text-white');
          } else {
            el.classList.add('bg-red-500', 'text-white');
          }
        }
      });

      const info = [];
      if (latest.trend_strength != null) info.push(`강도: ${latest.trend_strength}`);
      if (latest.trend_duration_days != null) info.push(`${latest.trend_duration_days}일`);
      document.getElementById('chart-info').textContent = info.join(' | ');
    }

    // -----------------------------------------------------------------------
    // Symbol Names
    // -----------------------------------------------------------------------
    async function loadSymbolNames() {
      try {
        symbolNames = await fetchJSON(`/api/${market}/symbol-names`);
      } catch (e) {
        console.error('Failed to load symbol names:', e);
        symbolNames = {};
      }
    }

    function displayName(symbol) {
      const name = symbolNames[symbol];
      if (name && name !== symbol) {
        return `${name} (${symbol})`;
      }
      return symbol;
    }

    // -----------------------------------------------------------------------
    // AI Analysis
    // -----------------------------------------------------------------------
    async function runAnalysis() {
      if (!currentSymbol) return;

      const btn = document.getElementById('btn-analyze');
      const loading = document.getElementById('analysis-loading');
      const result = document.getElementById('analysis-result');

      btn.disabled = true;
      btn.innerHTML = '<svg class="w-4 h-4 animate-spin" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"/></svg> 분석 중...';
      loading.style.display = 'block';
      result.style.display = 'none';

      try {
        const data = await fetchJSON(`/api/${market}/analyze/${currentSymbol}`);

        if (data.error) {
          result.innerHTML = `<div class="text-red-400 text-sm">${data.error}</div>`;
        } else {
          const html = markdownToHtml(data.analysis);
          result.innerHTML = `
            <div class="grid grid-cols-3 gap-3 mb-4">
              <div class="bg-slate-700/50 rounded-lg p-3 text-center">
                <div class="text-xs text-slate-400 mb-1">현재가</div>
                <div class="text-lg font-bold">${Number(data.price).toLocaleString()}</div>
                <div class="text-xs ${data.change_pct >= 0 ? 'text-green-400' : 'text-red-400'}">${data.change_pct >= 0 ? '+' : ''}${data.change_pct}% (60일)</div>
              </div>
              <div class="bg-slate-700/50 rounded-lg p-3 text-center">
                <div class="text-xs text-slate-400 mb-1">리버모어 상태</div>
                <div class="text-sm font-medium mt-1">${data.livermore_state}</div>
              </div>
              <div class="bg-slate-700/50 rounded-lg p-3 text-center">
                <div class="text-xs text-slate-400 mb-1">시그널</div>
                <div class="text-sm font-medium mt-1">${data.signal}</div>
              </div>
            </div>
            <div class="prose prose-invert prose-sm max-w-none text-slate-300 leading-relaxed">
              ${html}
            </div>
            <div class="mt-3 text-right text-xs text-slate-600">Powered by Gemini AI</div>
          `;
        }

        result.style.display = 'block';
      } catch (e) {
        result.innerHTML = `<div class="text-red-400 text-sm">분석 중 오류 발생: ${e.message}</div>`;
        result.style.display = 'block';
      } finally {
        loading.style.display = 'none';
        btn.disabled = false;
        btn.innerHTML = '<svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9.663 17h4.673M12 3v1m6.364 1.636l-.707.707M21 12h-1M4 12H3m3.343-5.657l-.707-.707m2.828 9.9a5 5 0 117.072 0l-.548.547A3.374 3.374 0 0014 18.469V19a2 2 0 11-4 0v-.531c0-.895-.356-1.754-.988-2.386l-.548-.547z"/></svg> Gemini 분석';
      }
    }

    function markdownToHtml(md) {
      // Simple markdown → HTML converter
      return md
        .replace(/### (.*)/g, '<h4 class="text-slate-200 font-semibold mt-4 mb-1">$1</h4>')
        .replace(/## (.*)/g, '<h3 class="text-slate-100 font-bold mt-5 mb-2 text-base">$1</h3>')
        .replace(/# (.*)/g, '<h2 class="text-slate-100 font-bold mt-5 mb-2 text-lg">$1</h2>')
        .replace(/\*\*(.*?)\*\*/g, '<strong class="text-slate-100">$1</strong>')
        .replace(/\*(.*?)\*/g, '<em>$1</em>')
        .replace(/^- (.*)/gm, '<li class="ml-4 list-disc">$1</li>')
        .replace(/(<li.*<\/li>\n?)+/g, '<ul class="my-2">$&</ul>')
        .replace(/\n\n/g, '</p><p class="mb-2">')
        .replace(/\n/g, '<br>')
        .replace(/^(.+)$/gm, function(match) {
          if (match.startsWith('<')) return match;
          return match;
        });
    }

    // -----------------------------------------------------------------------
    // Init
    // -----------------------------------------------------------------------
    updateMarketButtons();
    loadSymbolNames().then(async () => {
      loadIndices();
      await loadSignalDates();
      initSelectedDate();
      loadSummary();
      loadSignals();
    });
  </script>
